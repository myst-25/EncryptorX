<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple password-based encryption with Morse-style encoding">
    <meta name="theme-color" content="#000000">
    <title>EncryptorX</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background-color: #0a0a0a;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.6;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            padding: 8px;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        .card {
            background: transparent;
            border: 1px solid;
            border-color: #e0e0e0;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        body.dark .card {
            border-color: #333333;
        }

        .card:hover {
            border-color: #000000;
        }

        body.dark .card:hover {
            border-color: #ffffff;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid;
            border-color: #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            background-color: #ffffff;
            color: #000000;
            transition: all 0.3s ease;
            resize: none;
        }

        body.dark input[type="text"],
        body.dark input[type="password"],
        body.dark textarea {
            background-color: #1a1a1a;
            color: #ffffff;
            border-color: #333333;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        body.dark input[type="text"]:focus,
        body.dark input[type="password"]:focus,
        body.dark textarea:focus {
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        textarea {
            font-size: 13px;
            min-height: 100px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid;
            border-color: #000000;
            background-color: #000000;
            color: #ffffff;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.dark button {
            border-color: #ffffff;
            background-color: #ffffff;
            color: #000000;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-secondary {
            background-color: transparent;
            color: #000000;
            border-color: #000000;
        }

        body.dark .button-secondary {
            color: #ffffff;
            border-color: #ffffff;
        }

        .button-secondary:hover {
            background-color: #f0f0f0;
        }

        body.dark .button-secondary:hover {
            background-color: #1a1a1a;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid;
            border-color: #e0e0e0;
        }

        body.dark .tabs {
            border-color: #333333;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.5;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            opacity: 1;
            border-bottom-color: #000000;
        }

        body.dark .tab-btn.active {
            border-bottom-color: #ffffff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid;
            border-color: #e0e0e0;
            font-size: 12px;
            opacity: 0.6;
        }

        body.dark .footer {
            border-color: #333333;
        }

        .footer a {
            color: inherit;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .footer a:hover {
            opacity: 1;
        }

        .status {
            font-size: 12px;
            margin-top: 8px;
            opacity: 0.6;
            min-height: 16px;
        }

        .status.success {
            color: #10b981;
        }

        .status.error {
            color: #ef4444;
        }

        .morse-output {
            background-color: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            line-height: 1.8;
            letter-spacing: 2px;
        }

        body.dark .morse-output {
            background-color: #1a1a1a;
        }

        .copy-indicator {
            display: inline-block;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .copy-indicator.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <div class="container">
        <div class="header">
            <div class="logo">EncryptorX</div>
            <div class="subtitle">Secure password-based encryption</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="encrypt">Encrypt</button>
            <button class="tab-btn" data-tab="decrypt">Decrypt</button>
        </div>

        <!-- Encrypt Tab -->
        <div id="encrypt" class="tab-content active">
            <div class="card">
                <div class="card-title">Encrypt Your Message</div>

                <div class="form-group">
                    <label for="encryptPassword">Password</label>
                    <input type="password" id="encryptPassword" placeholder="Enter a strong password">
                </div>

                <div class="form-group">
                    <label for="encryptText">Message</label>
                    <textarea id="encryptText" placeholder="Enter text to encrypt..."></textarea>
                </div>

                <div class="button-group">
                    <button id="encryptBtn">Encrypt</button>
                </div>

                <div class="status" id="encryptStatus"></div>

                <div class="form-group" style="margin-top: 24px; display: none;" id="encryptOutputGroup">
                    <label>Encrypted Code (Morse-Style)</label>
                    <div class="morse-output" id="encryptOutput"></div>
                    <div class="button-group" style="margin-top: 12px;">
                        <button class="button-secondary" id="copyEncryptBtn">Copy</button>
                        <button class="button-secondary" id="downloadEncryptBtn">Download</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Decrypt Tab -->
        <div id="decrypt" class="tab-content">
            <div class="card">
                <div class="card-title">Decrypt Your Message</div>

                <div class="form-group">
                    <label for="decryptPassword">Password</label>
                    <input type="password" id="decryptPassword" placeholder="Enter the decryption password">
                </div>

                <div class="form-group">
                    <label for="decryptText">Encrypted Code</label>
                    <textarea id="decryptText" placeholder="Paste the encrypted code here..."></textarea>
                </div>

                <div class="button-group">
                    <button id="decryptBtn">Decrypt</button>
                </div>

                <div class="status" id="decryptStatus"></div>

                <div class="form-group" style="margin-top: 24px; display: none;" id="decryptOutputGroup">
                    <label>Decrypted Message</label>
                    <textarea id="decryptOutput" readonly></textarea>
                    <div class="button-group" style="margin-top: 12px;">
                        <button class="button-secondary" id="copyDecryptBtn">Copy</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>🔒 All encryption happens in your browser. Nothing is sent to any server.</p>
            <p style="margin-top: 12px;">
                <a href="https://github.com/myst-25/EncryptorX" target="_blank">GitHub</a> • 
                Version v4.0.0
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // MORSE-STYLE ENCRYPTION LOGIC
        // ============================================

        // Convert bytes to Morse-style dots and dashes
        function bytesToMorse(bytes) {
            let morse = '';
            for (let i = 0; i < bytes.length; i++) {
                const byte = bytes[i];
                // Convert each byte to 8-bit binary, then to Morse (0 = dot, 1 = dash)
                const binary = byte.toString(2).padStart(8, '0');
                for (let j = 0; j < binary.length; j++) {
                    morse += binary[j] === '0' ? '·' : '−';
                }
                // Add space between bytes for readability
                if (i < bytes.length - 1) {
                    morse += ' ';
                }
            }
            return morse;
        }

        // Convert Morse-style back to bytes
        function morseToBytes(morse) {
            const parts = morse.split(' ');
            const bytes = [];
            for (let part of parts) {
                let binary = '';
                for (let char of part) {
                    binary += char === '·' ? '0' : '1';
                }
                bytes.push(parseInt(binary, 2));
            }
            return new Uint8Array(bytes);
        }

        // Derive key using PBKDF2 with fixed salt
        async function deriveKey(password) {
            const encoder = new TextEncoder();
            const passwordBytes = encoder.encode(password);
            const fixedSalt = encoder.encode('EncryptorX');

            const importedPassword = await crypto.subtle.importKey(
                'raw',
                passwordBytes,
                'PBKDF2',
                false,
                ['deriveBits']
            );

            const derivedBits = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: fixedSalt,
                    iterations: 250000,
                    hash: 'SHA-512'
                },
                importedPassword,
                256
            );

            const key = await crypto.subtle.importKey(
                'raw',
                derivedBits,
                'AES-GCM',
                false,
                ['encrypt', 'decrypt']
            );

            return key;
        }

        // Encrypt text to Morse-style
        async function encryptText(plaintext, password) {
            const key = await deriveKey(password);
            const encoder = new TextEncoder();
            const plaintextBytes = encoder.encode(plaintext);
            const iv = crypto.getRandomValues(new Uint8Array(12));

            const ciphertext = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                plaintextBytes
            );

            // Combine IV + ciphertext
            const combined = new Uint8Array(iv.length + ciphertext.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(ciphertext), iv.length);

            // Convert to Morse-style
            return bytesToMorse(combined);
        }

        // Decrypt Morse-style to text
        async function decryptText(morseCode, password) {
            try {
                const key = await deriveKey(password);
                const combined = morseToBytes(morseCode);

                const iv = combined.slice(0, 12);
                const ciphertext = combined.slice(12);

                const plaintext = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    ciphertext
                );

                const decoder = new TextDecoder();
                return decoder.decode(plaintext);
            } catch (error) {
                throw new Error('Invalid password or corrupted code');
            }
        }

        // ============================================
        // UI LOGIC
        // ============================================

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            themeToggle.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        });

        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // Encrypt functionality
        const encryptBtn = document.getElementById('encryptBtn');
        const encryptPassword = document.getElementById('encryptPassword');
        const encryptText = document.getElementById('encryptText');
        const encryptOutput = document.getElementById('encryptOutput');
        const encryptOutputGroup = document.getElementById('encryptOutputGroup');
        const encryptStatus = document.getElementById('encryptStatus');
        const copyEncryptBtn = document.getElementById('copyEncryptBtn');
        const downloadEncryptBtn = document.getElementById('downloadEncryptBtn');

        encryptBtn.addEventListener('click', async () => {
            const password = encryptPassword.value.trim();
            const plaintext = encryptText.value.trim();

            if (!password || password.length < 8) {
                encryptStatus.textContent = '❌ Password must be at least 8 characters';
                encryptStatus.className = 'status error';
                return;
            }

            if (!plaintext) {
                encryptStatus.textContent = '❌ Enter text to encrypt';
                encryptStatus.className = 'status error';
                return;
            }

            encryptBtn.disabled = true;
            encryptStatus.textContent = 'Encrypting...';
            encryptStatus.className = 'status';

            try {
                const morse = await encryptText(plaintext, password);
                encryptOutput.textContent = morse;
                encryptOutputGroup.style.display = 'block';
                encryptStatus.textContent = '✓ Encrypted successfully';
                encryptStatus.className = 'status success';
            } catch (error) {
                encryptStatus.textContent = '❌ ' + error.message;
                encryptStatus.className = 'status error';
            }

            encryptBtn.disabled = false;
        });

        copyEncryptBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(encryptOutput.textContent);
            const indicator = copyEncryptBtn.querySelector('.copy-indicator') || document.createElement('span');
            indicator.className = 'copy-indicator show';
            indicator.textContent = '✓ Copied';
            if (!copyEncryptBtn.querySelector('.copy-indicator')) {
                copyEncryptBtn.appendChild(indicator);
            }
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        });

        downloadEncryptBtn.addEventListener('click', () => {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(encryptOutput.textContent));
            element.setAttribute('download', 'encrypted_' + Date.now() + '.enc');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        });

        // Decrypt functionality
        const decryptBtn = document.getElementById('decryptBtn');
        const decryptPassword = document.getElementById('decryptPassword');
        const decryptText = document.getElementById('decryptText');
        const decryptOutput = document.getElementById('decryptOutput');
        const decryptOutputGroup = document.getElementById('decryptOutputGroup');
        const decryptStatus = document.getElementById('decryptStatus');
        const copyDecryptBtn = document.getElementById('copyDecryptBtn');

        decryptBtn.addEventListener('click', async () => {
            const password = decryptPassword.value.trim();
            const morse = decryptText.value.trim();

            if (!password || password.length < 8) {
                decryptStatus.textContent = '❌ Password must be at least 8 characters';
                decryptStatus.className = 'status error';
                return;
            }

            if (!morse) {
                decryptStatus.textContent = '❌ Paste encrypted code';
                decryptStatus.className = 'status error';
                return;
            }

            decryptBtn.disabled = true;
            decryptStatus.textContent = 'Decrypting...';
            decryptStatus.className = 'status';

            try {
                const plaintext = await decryptText(morse, password);
                decryptOutput.value = plaintext;
                decryptOutputGroup.style.display = 'block';
                decryptStatus.textContent = '✓ Decrypted successfully';
                decryptStatus.className = 'status success';
            } catch (error) {
                decryptOutput.value = '';
                decryptStatus.textContent = '❌ ' + error.message;
                decryptStatus.className = 'status error';
            }

            decryptBtn.disabled = false;
        });

        copyDecryptBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(decryptOutput.value);
            const indicator = copyDecryptBtn.querySelector('.copy-indicator') || document.createElement('span');
            indicator.className = 'copy-indicator show';
            indicator.textContent = '✓ Copied';
            if (!copyDecryptBtn.querySelector('.copy-indicator')) {
                copyDecryptBtn.appendChild(indicator);
            }
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 2000);
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
